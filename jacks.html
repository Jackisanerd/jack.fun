  const pk=AC.createBiquadFilter();pk.type='peaking';pk.frequency.value=80;pk.gain.value=6;pk.Q.value=1.5;
  const g=AC.createGain();g.gain.value=Math.min(vol*1.4,0.85);
  src.buffer=buf;src.connect(lp);lp.connect(pk);pk.connect(g);g.connect(AC.destination);src.start();
}

function playClick(vol){
  vol=vol||0.15;
  const osc=AC.createOscillator(),g=AC.createGain();
  osc.frequency.value=280+Math.random()*180;osc.type='sine';
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.07);
  osc.connect(g);g.connect(AC.destination);osc.start();osc.stop(AC.currentTime+0.07);
}

function startWaves(){
  const sr=AC.sampleRate;


  function makeSwell(){
    const dur=12, len=sr*dur;
    const buf=AC.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      const phaseOff=ch*0.8;
      for(let i=0;i<len;i++){
        const t=i/sr;

        const cycle=t/dur;
        const swell=Math.pow(Math.sin(Math.PI*cycle),0.6);
        const crash=Math.exp(-Math.pow((cycle-0.65)*8,2))*0.9;
        const foam=Math.max(0,(1-cycle*1.4))*0.3;
        const env=swell*0.4+crash+foam;

        const n=(Math.random()*2-1);

        d[i]=n*env*0.055*(1+0.3*Math.sin(2*Math.PI*0.07*t+phaseOff));
      }
    }
    const src=AC.createBufferSource();
    src.buffer=buf;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=280;
    const lp2=AC.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=180;
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=40;
    const g=AC.createGain();g.gain.value=0.9;
    src.connect(hp);hp.connect(lp);lp.connect(lp2);lp2.connect(g);g.connect(AC.destination);
    src.onended=makeSwell;
    src.start();
  }


  function makeShore(){
    const dur=7+Math.random()*4, len=Math.floor(sr*dur);
    const buf=AC.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++){
        const t=i/sr;
        const cycle=t/dur;
        const env=Math.pow(Math.sin(Math.PI*Math.min(cycle*1.3,1)),1.2)*Math.exp(-cycle*1.8)*0.7
                 +Math.max(0,cycle-0.5)*Math.exp(-(cycle-0.5)*4)*0.4;
        d[i]=(Math.random()*2-1)*env*0.04;
      }
    }
    const src=AC.createBufferSource();
    src.buffer=buf;
    const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=600;bp.Q.value=0.4;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;
    const g=AC.createGain();g.gain.value=0.55;
    src.connect(lp);lp.connect(bp);bp.connect(g);g.connect(AC.destination);
    src.onended=makeShore;
    src.start();
  }


  function makeFoam(){
    const dur=6, len=sr*dur;
    const buf=AC.createBuffer(1,len,sr);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++){
      const t=i/sr;
      const breathe=0.5+0.5*Math.sin(2*Math.PI*0.18*t+1.2);
      d[i]=(Math.random()*2-1)*0.012*breathe;
    }
    const src=AC.createBufferSource();
    src.buffer=buf;src.loop=true;
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=2000;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=5000;
    const g=AC.createGain();g.gain.value=0.3;
    src.connect(hp);hp.connect(lp);lp.connect(g);g.connect(AC.destination);
    src.start();
  }

  makeSwell();
  setTimeout(makeShore, 2000);
  makeFoam();
}
startWaves();

const ROCK_NAMES=['jack','jack2','jack3','jack4'];
const images={};
let loaded=0;
ROCK_NAMES.forEach(name=>{
  const img=new Image();
  img.onload=()=>{loaded++;if(loaded===4)initGame();};
  img.src= name + '.png';
  images[name]=img;
});

function pixelHit(r1,r2){
  const m1=MASKS_DATA[r1.name+'_mask'],m2=MASKS_DATA[r2.name+'_mask'];
  if(Math.abs(r1.x-r2.x)>(r1.w+r2.w)/2)return false;
  if(Math.abs(r1.y-r2.y)>(r1.h+r2.h)/2)return false;
  const cos1=Math.cos(r1.angle),sin1=Math.sin(r1.angle);
  const cos2=Math.cos(-r2.angle),sin2=Math.sin(-r2.angle);
  for(let my=0;my<m1.h;my++){
    for(let mx=0;mx<m1.w;mx++){
      if(!m1.data[my][mx])continue;
      const s1=r1.scale||1,s2=r2.scale||1;
      const lx=(mx*m1.step+m1.step/2)*s1-r1.w/2,ly=(my*m1.step+m1.step/2)*s1-r1.h/2;
      const wx=r1.x+lx*cos1-ly*sin1,wy=r1.y+lx*sin1+ly*cos1;
      const dx=wx-r2.x,dy=wy-r2.y;
      const lx2=dx*cos2-dy*sin2+r2.w/2,ly2=dx*sin2+dy*cos2+r2.h/2;
      const mx2=Math.floor(lx2/m2.step/s2),my2=Math.floor(ly2/m2.step/s2);
      if(mx2>=0&&mx2<m2.w&&my2>=0&&my2<m2.h&&m2.data[my2][mx2])return true;
    }
  }
  return false;
}

function collisionPenetration(r1,r2){
  const dx=r2.x-r1.x,dy=r2.y-r1.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  return{nx:dx/dist,ny:dy/dist};
}

const GRAVITY=0.62,FRICTION=0.975,BOUNCE=0.18,ANG_DAMP=0.85;
let rocks=[],dragged=null;
let mouseX=0,mouseY=0,lastMX=0,lastMY=0,dragOffX=0,dragOffY=0;

const GROUND_Y=()=>canvas.height-8;
const WALL_L=()=>-20;
const WALL_R=()=>canvas.width+20;

function initGame(){
  const cx=canvas.width/2;
  rocks=ROCK_NAMES.map((name,i)=>({
    name,img:images[name],
    w:MASKS_DATA[name+'_mask'].img_w*1,h:MASKS_DATA[name+'_mask'].img_h*1,scale:1,
    x:cx+(Math.random()-0.5)*6,
    y:GROUND_Y()-MASKS_DATA[name+'_mask'].img_h*1/2-i*(MASKS_DATA[name+'_mask'].img_h*1+2),
    vx:(Math.random()-0.5)*0.4,vy:0,
    angle:(Math.random()-0.5)*0.06,
    va:(Math.random()-0.5)*0.008,
    onGround:false
  }));
  loop();
}

let lastT=0;
function loop(ts){
  ts=ts||0;
  const dt=Math.min((ts-lastT)/16.67,3);lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

function update(dt){
  for(const r of rocks){
    if(r===dragged)continue;
    r.vy+=GRAVITY*dt;
    r.x+=r.vx*dt;r.y+=r.vy*dt;r.angle+=r.va*dt;
    r.vx*=Math.pow(FRICTION,dt);
    r.va*=Math.pow(ANG_DAMP,dt);
    const gy=GROUND_Y();
    if(r.y+r.h/2>gy){
      const spd=Math.abs(r.vy);
      if(spd>1)playThud(Math.min(spd*0.04,0.5),0.8+Math.random()*0.4);
      r.y=gy-r.h/2;
      r.vy*=-BOUNCE;
      r.vx*=0.72;r.va*=0.55;
      if(Math.abs(r.vy)<0.4)r.vy=0;
      if(Math.abs(r.vx)<0.08)r.vx=0;
      if(Math.abs(r.va)<0.001)r.va=0;
      r.onGround=true;
    }else{r.onGround=false;}
    if(r.x-r.w/2<WALL_L()){r.x=WALL_L()+r.w/2;r.vx=Math.abs(r.vx)*BOUNCE;playThud(0.1,1.2);}
    if(r.x+r.w/2>WALL_R()){r.x=WALL_R()-r.w/2;r.vx=-Math.abs(r.vx)*BOUNCE;playThud(0.1,1.2);}
  }

  for(let iter=0;iter<3;iter++){
    for(let i=0;i<rocks.length;i++){
      for(let j=i+1;j<rocks.length;j++){
        const a=rocks[i],b=rocks[j];
        if(!pixelHit(a,b))continue;
        const{nx,ny}=collisionPenetration(a,b);
        const aFree=a!==dragged,bFree=b!==dragged;
        const push=3;
        if(aFree&&bFree){a.x-=nx*push/2;a.y-=ny*push/2;b.x+=nx*push/2;b.y+=ny*push/2;}
        else if(aFree){a.x-=nx*push;a.y-=ny*push;}
        else if(bFree){b.x+=nx*push;b.y+=ny*push;}
        if(iter===0){
          const relVx=b.vx-a.vx,relVy=b.vy-a.vy;
          const dot=relVx*nx+relVy*ny;
          if(dot<0){
            const rest=Math.abs(dot)<2?0.05:BOUNCE;
            const imp=dot*(1+rest)/(aFree&&bFree?2:1);
            if(aFree){a.vx+=imp*nx;a.vy+=imp*ny;a.va+=(Math.random()-0.5)*0.01*Math.abs(dot);}
            if(bFree){b.vx-=imp*nx;b.vy-=imp*ny;b.va+=(Math.random()-0.5)*0.01*Math.abs(dot);}
            if(Math.abs(dot)>1.5){playThud(Math.min(Math.abs(dot)*0.06,0.4),1.1+Math.random()*0.3);}
          }
          if(aFree&&Math.abs(a.vx)<0.15&&Math.abs(a.vy)<0.15){a.vx*=0.5;a.vy*=0.5;a.va*=0.5;}
          if(bFree&&Math.abs(b.vx)<0.15&&Math.abs(b.vy)<0.15){b.vx*=0.5;b.vy*=0.5;b.va*=0.5;}
        }
      }
    }
  }

  if(dragged){
    const tx=mouseX+dragOffX,ty=mouseY+dragOffY;
    dragged.vx=(tx-dragged.x)*0.4;dragged.vy=(ty-dragged.y)*0.4;
    dragged.x=tx;dragged.y=ty;dragged.va*=0.8;
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const sorted=[...rocks].sort((a,b)=>a.y-b.y);


  for(const r of sorted){
    const gy=GROUND_Y();
    const bottom=r.y+r.h/2;
    const dist=Math.max(0,gy-bottom);
    const t=Math.max(0,1-dist/260);
    const sw=r.w*0.62*t;
    const sh=20*t;
    const ox=dist*0.15;
    ctx.save();
    ctx.translate(r.x+ox, gy-2);
    ctx.scale(1, sh/Math.max(sw,1));
    const grd=ctx.createRadialGradient(0,0,0,0,0,sw);
    grd.addColorStop(0,`rgba(0,0,0,${0.42*t})`);
    grd.addColorStop(0.5,`rgba(0,0,0,${0.18*t})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(0,0,sw,0,Math.PI*2);
    ctx.fillStyle=grd;
    ctx.fill();
    ctx.restore();
  }


  for(const r of sorted){
    ctx.save();
    ctx.translate(r.x,r.y);ctx.rotate(r.angle);
    ctx.drawImage(r.img,-r.w/2,-r.h/2,r.w,r.h);
    ctx.restore();
  }


  ctx.beginPath();
  ctx.arc(mouseX,mouseY,dragged?9:5,0,Math.PI*2);
  ctx.fillStyle=dragged?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.45)';
  ctx.fill();
}
function getRock(mx,my){
  const sorted=[...rocks].sort((a,b)=>b.y-a.y);
  for(const r of sorted){
    const m=MASKS_DATA[r.name+'_mask'];
    const cos=Math.cos(-r.angle),sin=Math.sin(-r.angle);
    const dx=mx-r.x,dy=my-r.y;
    const s=r.scale||1;
    const lx=dx*cos-dy*sin+r.w/2,ly=dx*sin+dy*cos+r.h/2;
    const mx2=Math.floor(lx/m.step/s),my2=Math.floor(ly/m.step/s);
    if(mx2>=0&&mx2<m.w&&my2>=0&&my2<m.h&&m.data[my2][mx2])return r;
  }
  return null;
}

function resume(){
  AC.resume();
}

canvas.addEventListener('mousedown',e=>{
  resume();
  const r=getRock(e.clientX,e.clientY);
  if(r){dragged=r;dragOffX=r.x-e.clientX;dragOffY=r.y-e.clientY;r.va=0;playClick(0.2);}
});
canvas.addEventListener('mousemove',e=>{lastMX=mouseX;lastMY=mouseY;mouseX=e.clientX;mouseY=e.clientY;});
canvas.addEventListener('mouseup',e=>{
  if(dragged){dragged.vx=(mouseX-lastMX)*1.5;dragged.vy=(mouseY-lastMY)*1.5;dragged.va=(Math.random()-0.5)*0.08;dragged=null;playClick(0.1);}
});
canvas.addEventListener('touchstart',e=>{resume();e.preventDefault();const t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;const r=getRock(t.clientX,t.clientY);if(r){dragged=r;dragOffX=r.x-t.clientX;dragOffY=r.y-t.clientY;r.va=0;playClick(0.2);}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];lastMX=mouseX;lastMY=mouseY;mouseX=t.clientX;mouseY=t.clientY;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(dragged){dragged.vx=(mouseX-lastMX)*1.5;dragged.vy=(mouseY-lastMY)*1.5;dragged.va=(Math.random()-0.5)*0.08;dragged=null;playClick(0.1);}},{passive:false});
</script>
</body>
</html>
