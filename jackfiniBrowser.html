<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jackinibrowser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .nav { display: flex; align-items: center; gap: 28px; padding: 16px 28px; border-bottom: 1px solid #222; }
  .nav a { color: #aaa; font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .nav a:hover { color: #fff; }
  .hero { padding: 48px 28px 32px; }
  .logo { font-size: 40px; font-weight: 700; letter-spacing: -1px; margin-bottom: 10px; }
  .logo .bold { font-weight: 900; color: #fff; }
  .logo .light { font-weight: 300; color: #bbb; }
  .tagline { font-size: 15px; color: #888; margin-bottom: 24px; }
  .tagline strong { color: #ddd; font-weight: 600; }
  .search-wrap { position: relative; max-width: 860px; margin-bottom: 20px; }
  .search-wrap input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px 44px 14px 16px; font-size: 15px; color: #ddd; outline: none; transition: border 0.2s; }
  .search-wrap input:focus { border-color: #444; }
  .search-wrap input::placeholder { color: #555; }
  .search-wrap .si { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #555; pointer-events: none; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; justify-content: flex-end; max-width: 860px; }
  .time-btn { display: flex; align-items: center; gap: 6px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 7px 14px; font-size: 13px; color: #aaa; cursor: pointer; }
  .time-btn:hover { border-color: #444; color: #ddd; }
  .up-btn { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 7px 12px; color: #aaa; cursor: pointer; }
  .up-btn:hover { border-color: #444; color: #ddd; }
  .grid-wrap { padding: 0 28px 48px; }
  .elem-grid { display: flex; flex-wrap: wrap; gap: 8px; max-width: 1100px; }
  .elem { display: inline-flex; align-items: center; gap: 7px; background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 14px; font-size: 14px; color: #ccc; cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s; user-select: none; white-space: nowrap; }
  .elem:hover { background: #252525; border-color: #3a3a3a; color: #fff; }
  .elem:active { transform: scale(0.97); }
  .elem .ic { font-size: 16px; line-height: 1; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px; width: 100%; max-width: 600px; max-height: 88vh; overflow-y: auto; padding: 28px; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: #252525; border: 1px solid #333; border-radius: 6px; color: #aaa; cursor: pointer; padding: 5px 12px; font-size: 13px; }
  .modal-close:hover { color: #fff; border-color: #555; }
  .modal-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .modal-subtitle { font-size: 13px; color: #555; margin-bottom: 24px; }
  .recipe-step { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: #252525; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #666; flex-shrink: 0; }
  .step-body { flex: 1; background: #212121; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 14px; font-size: 14px; color: #ccc; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .step-a { color: #ddd; font-weight: 500; }
  .step-plus { color: #444; font-size: 14px; }
  .step-eq { color: #444; font-size: 14px; }
  .step-result { color: #7cb8ff; font-weight: 600; }
  .final-tag { display: inline-flex; align-items: center; gap: 8px; background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #6f9; margin-top: 18px; }
</style>
</head>
<body>

<div class="hero">
  <div class="logo"><span class="bold">Jackfini</span><span class="light">browser</span></div>
  <div class="tagline">Browse over <strong>7</strong> elements and <strong>~100 million</strong> recipes for Jackfinite Craft</div>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search..." oninput="filterElems(this.value)" />
    <svg class="si" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
  <div class="toolbar">
  </div>
</div>

<div class="grid-wrap">
  <div class="elem-grid" id="elem-grid"></div>
</div>

<div class="modal-bg" id="modal-bg" onclick="bgClose(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕ Close</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div id="modal-steps"></div>
    <div id="modal-final"></div>

const grid = document.getElementById('elem-grid');

function renderAll(list) {
  grid.innerHTML = '';
  list.forEach(el => {
    const d = document.createElement('div');
    d.className = 'elem';
    d.innerHTML = '<span class="ic">' + el.e + '</span>' + el.n;
    d.onclick = () => openModal(el);
    grid.appendChild(d);
  });
}

function filterElems(q) {
  const t = q.trim().toLowerCase();
  renderAll(t ? elements.filter(e => e.n.toLowerCase().includes(t)) : elements);
}

function openModal(el) {
  document.getElementById('modal-title').textContent = el.e + ' ' + el.n;
  document.getElementById('modal-subtitle').textContent = el.steps.length + ' crafting steps';
  const stepsEl = document.getElementById('modal-steps');
  stepsEl.innerHTML = '';
  el.steps.forEach((step, i) => {
    const row = document.createElement('div');
    row.className = 'recipe-step';
    row.innerHTML =
      '<div class="step-num">' + (i + 1) + '</div>' +
      '<div class="step-body">' +
        '<span class="step-a">' + step[0] + '</span>' +
        '<span class="step-plus">+</span>' +
        '<span class="step-a">' + step[1] + '</span>' +
        '<span class="step-eq">=</span>' +
        '<span class="step-result">' + step[2] + '</span>' +
      '</div>';
    stepsEl.appendChild(row);
  });
  const last = el.steps[el.steps.length - 1][2];
  document.getElementById('modal-final').innerHTML =
    '<div class="final-tag">✓ Final result: <strong>' + last + '</strong></div>';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function bgClose(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderAll(elements);
</script>

</html>
