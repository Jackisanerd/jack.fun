<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotes I Guess</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      transition: background 1s ease;
    }

    #quote-container {
      padding: 40px;
      background-color: rgba(255, 255, 255, 0.7);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      max-width: 80%;
      z-index: 1;
      transition: transform 0.3s ease;
    }

    #quote-text {
      font-size: 24px;
      font-style: italic;
      color: #333;
      margin-bottom: 20px;
      transition: color 0.5s ease;
    }

    #author {
      font-size: 18px;
      color: #555;
      font-weight: bold;
      margin-bottom: 20px;
      transition: color 0.5s ease;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2980b9;
    }

    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes moveParticle {
      0% { transform: translateY(0) translateX(0); opacity: 1; }
      100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
    }

    .particle {
      pointer-events: none;
      position: absolute;
      z-index: 0;
    }
  </style>
</head>
<body>

  <div id="quote-container">
    <div id="quote-text">"Let's tickle South Africa's hhhhmmmm-haha. Gonna stop what I was about to say there."</div>
    <div id="author">- Jack Massey Welsh</div>
    <button onclick="generateQuote()">New Quote</button>
  </div>

  <div class="particles" id="particles"></div>

  <script>
    const quotes = [
      { text: '"Let\'s impregnate this young lady!"', author: '- Jack Massey Welsh', theme: 'innovation' },
      { text: '"Give me a big naked gentleman!"', author: '- Jack Massey Welsh', theme: 'nature' },
      { text: '"Lets just drop Becky at the side of the road."', author: '- Jack Massey Welsh', theme: 'sports' },
      { text: '"I think they want us to lick the eggplant."', author: '- Jack Massey Welsh', theme: 'space' },
      { text: '"*aggressively humps plant* *rock music plays*"', author: '- Jack Massey Welsh', theme: 'mountain' },
      { text: '"I\'m hiding in your balls."', author: '- Jack Massey Welsh', theme: 'fire' },
      { text: '"You can wiggle it about a bit but individually they\'re hard."', author: '- Jack Massey Welsh', theme: 'art' },
      { text: '"I haven\'t had much s-ex."', author: '- Jack Massey Welsh', theme: 'tech' },
      { text: '"I wasn\'t a big fan of when Obama tentacle fiddled with me nipple."', author: '- Jack Massey Welsh', theme: 'ocean' },
      { text: '"Do you need me to rub it?<br>I do."', author: '- Jack Massey Welsh and Kai Ross Best', theme: 'clock' },
      { text: '"I\'ma munch me face all over that"', author: '- Jack Massey Welsh', theme: 'earth' },
      { text: '"Enhance Enhance!"', author: '- Jack Massey Welsh', theme: 'city' },
      { text: '"I Jack sucks at life, suck at life"', author: '- Jack Massey Welsh', theme: 'adventure' },
      { text: '"I AM A RHOMBUS!"', author: '- Jack Massey Welsh', theme: 'sky' },
      { text: '"I\'M A MARRIED WOMAN!"', author: '- Jack Massey Welsh', theme: 'rainbow' }
    ];

    const gradients = {
      innovation: 'linear-gradient(135deg, #3498db, #8e44ad)',
      nature:     'linear-gradient(135deg, #11998e, #38ef7d)',
      sports:     'linear-gradient(135deg, #e74c3c, #f39c12)',
      space:      'linear-gradient(135deg, #0f0c29, #302b63, #24243e)',
      mountain:   'linear-gradient(135deg, #4b6cb7, #182848)',
      fire:       'linear-gradient(135deg, #ff7f50, #ff4500)',
      art:        'linear-gradient(135deg, #f953c6, #b91d73)',
      tech:       'linear-gradient(135deg, #2980b9, #2ecc71)',
      ocean:      'linear-gradient(135deg, #1a3a8f, #00b4d8)',
      clock:      'linear-gradient(135deg, #373b44, #4286f4)',
      earth:      'linear-gradient(135deg, #5a3e2b, #3a7d44)',
      city:       'linear-gradient(135deg, #232526, #414345)',
      adventure:  'linear-gradient(135deg, #c94b4b, #4b134f)',
      sky:        'linear-gradient(135deg, #56ccf2, #2f80ed)',
      rainbow:    'linear-gradient(135deg, #FF6347, #FFD700, #32CD32, #1E90FF, #9400D3)'
    };

    function generateQuote() {
      const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
      const randomTextColor = getRandomColor();

      document.getElementById('quote-text').style.color = randomTextColor;
      document.getElementById('author').style.color = randomTextColor;
      document.getElementById('quote-text').innerHTML = randomQuote.text;
      document.getElementById('author').innerText = randomQuote.author;

      document.getElementById('particles').innerHTML = '';
      document.body.style.background = gradients[randomQuote.theme] || gradients.tech;
      addParticles();
    }

    function getRandomColor() {
      const letters = '0123456789ABCDEF';
      let color = '#';
      for (let i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * 16)];
      return color;
    }

    function addParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 100; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        p.style.borderRadius = '50%';
        p.style.width = `${Math.random() * 5 + 5}px`;
        p.style.height = p.style.width;
        p.style.backgroundColor = getRandomColor();
        p.style.animation = `moveParticle ${Math.random() * 5 + 5}s linear infinite`;
        p.style.top = `${Math.random() * window.innerHeight}px`;
        p.style.left = `${Math.random() * window.innerWidth}px`;
        p.addEventListener('animationend', function() { this.remove(); });
        container.appendChild(p);
      }
    }

    window.onload = generateQuote;
  </script>

</body>
</html>
